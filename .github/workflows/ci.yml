name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  hygiene:
    name: Rename hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Check retired-name boundary
        run: npm run check:retired-name

  ubuntu-cli:
    name: Ubuntu CLI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Test engine and CLI
        run: cargo test --locked -p chemsema-engine -p chemsema-cli

      - name: Build and smoke-test CLI
        run: |
          cargo build --locked --release -p chemsema-cli
          target/release/chemsema-cli version --pretty
          target/release/chemsema-cli capabilities >/dev/null
          target/release/chemsema-cli label-query --text CF3 --connection-angle 0 >/dev/null

      - name: Check CLI skill against Ubuntu runtime
        env:
          CHEMSEMA_CLI: ${{ github.workspace }}/target/release/chemsema-cli
        run: python3 ChemSemaSkills/skills/chemsema-cli/scripts/check_cli_skill_sync.py --suite-root ChemSemaSkills --json

      - name: Package and test Linux CLI distribution
        run: |
          archive=$(bash scripts/package-linux-cli.sh --cli target/release/chemsema-cli --out-dir target/linux-cli-dist)
          bash scripts/test-linux-cli-package.sh "$archive"

  verify:
    name: Windows verify
    runs-on: windows-latest
    env:
      NODE_OPTIONS: --no-deprecation

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        shell: pwsh
        run: |
          $version = "0.14.0"
          $archive = "$env:RUNNER_TEMP\wasm-pack.tar.gz"
          $installDir = "$env:RUNNER_TEMP\wasm-pack"
          Invoke-WebRequest `
            -Uri "https://github.com/wasm-bindgen/wasm-pack/releases/download/v$version/wasm-pack-v$version-x86_64-pc-windows-msvc.tar.gz" `
            -OutFile $archive
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          tar -xzf $archive -C $installDir --strip-components 1
          $installDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Node dependencies
        run: npm ci

      - name: Build desktop bundled resources
        run: cargo build -p chemsema-office -p chemsema-cli --release

      - name: Run Rust tests
        run: cargo test

      - name: Run repository verification
        run: npm run verify
