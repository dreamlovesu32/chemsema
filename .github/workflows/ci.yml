name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Windows verify
    runs-on: windows-latest
    env:
      NODE_OPTIONS: --no-deprecation

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        shell: pwsh
        run: |
          $version = "0.14.0"
          $archive = "$env:RUNNER_TEMP\wasm-pack.tar.gz"
          $installDir = "$env:RUNNER_TEMP\wasm-pack"
          Invoke-WebRequest `
            -Uri "https://github.com/wasm-bindgen/wasm-pack/releases/download/v$version/wasm-pack-v$version-x86_64-pc-windows-msvc.tar.gz" `
            -OutFile $archive
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          tar -xzf $archive -C $installDir --strip-components 1
          $installDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Node dependencies
        run: npm ci

      - name: Build desktop bundled resources
        run: cargo build -p chemcore-office -p chemcore-cli --release

      - name: Run Rust tests
        run: cargo test

      - name: Run repository verification
        run: npm run verify
