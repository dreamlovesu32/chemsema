<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>chemcore editor</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-view-mode="document">
    <div class="editor-shell">
      <header class="editor-topbar" aria-label="Editor toolbar">
        <div class="toolbar-row toolbar-row-primary">
          <div class="toolbar-group">
            <button class="icon-button" type="button" data-command="new" aria-label="New file" title="New file">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3.5h8.5L19 8v12.5H6z"/><path d="M14.5 3.5V8H19"/><path d="M12.5 11v6"/><path d="M9.5 14h6"/></svg>
            </button>
            <button class="icon-button" type="button" data-command="open" aria-label="Open file" title="Open file">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3.5 7.5h6l2 2h9v9.5H3.5z"/><path d="M3.5 7.5V5h5.2l2 2h6.8v2.5"/><path d="M8 14h8"/><path d="M13 11l3 3-3 3"/></svg>
            </button>
            <button class="icon-button" type="button" data-command="save" aria-label="Save as" title="Save as">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h12l2 2v14H5z"/><path d="M8 4v6h8V4"/><path d="M8 16h8v4H8z"/></svg>
            </button>
          </div>

          <div class="toolbar-divider" aria-hidden="true"></div>

          <div class="toolbar-group">
            <button class="icon-button" type="button" data-command="undo" aria-label="Undo" title="Undo">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 7 4.5 11.5 9 16"/><path d="M5 11.5h9.5a5 5 0 0 1 0 10"/></svg>
            </button>
            <button class="icon-button" type="button" data-command="redo" aria-label="Redo" title="Redo">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 7 4.5 4.5L15 16"/><path d="M19 11.5H9.5a5 5 0 0 0 0 10"/></svg>
            </button>
            <button class="icon-button" type="button" data-tool="delete" aria-label="Delete" title="Delete">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 7h14"/><path d="M9 7V4h6v3"/><path d="M7 7l1 13h8l1-13"/><path d="M10.5 11v5"/><path d="M13.5 11v5"/></svg>
            </button>
            <button class="icon-button" type="button" data-command="cut" aria-label="Cut" title="Cut">
              <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="6.5" cy="17.5" r="2.2"/><circle cx="17.5" cy="17.5" r="2.2"/><path d="M8.2 16 18 5"/><path d="m6 5 9.8 11"/></svg>
            </button>
            <button class="icon-button" type="button" data-command="copy" aria-label="Copy" title="Copy">
              <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="8" y="7" width="10" height="12"/><rect x="5" y="4" width="10" height="12"/></svg>
            </button>
            <button class="icon-button" type="button" data-command="paste" aria-label="Paste" title="Paste">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5h8v3H8z"/><path d="M6 7h12v13H6z"/><path d="M9 12h6"/><path d="M9 16h5"/></svg>
            </button>
          </div>

          <div class="toolbar-divider" aria-hidden="true"></div>

          <div class="toolbar-group zoom-group">
            <select id="zoom-input" class="zoom-input" aria-label="Zoom percentage">
              <option value="12">12%</option>
              <option value="25">25%</option>
              <option value="50">50%</option>
              <option value="75">75%</option>
              <option value="100" selected>100%</option>
              <option value="150">150%</option>
              <option value="200">200%</option>
              <option value="400">400%</option>
              <option value="600">600%</option>
              <option value="800">800%</option>
            </select>
            <button class="icon-button" type="button" data-command="zoom-in" aria-label="Zoom in" title="Zoom in">
              <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="10.5" cy="10.5" r="6.5"/><path d="m15.5 15.5 5 5"/><path d="M10.5 7.5v6"/><path d="M7.5 10.5h6"/></svg>
            </button>
            <button class="icon-button" type="button" data-command="zoom-out" aria-label="Zoom out" title="Zoom out">
              <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="10.5" cy="10.5" r="6.5"/><path d="m15.5 15.5 5 5"/><path d="M7.5 10.5h6"/></svg>
            </button>
            <button id="fit-button" class="icon-button" type="button" data-command="fit" aria-label="Fit all" title="Fit all">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9V4h5"/><path d="M20 9V4h-5"/><path d="M4 15v5h5"/><path d="M20 15v5h-5"/><path d="M8 8h8v8H8z"/></svg>
            </button>
          </div>

          <div class="toolbar-divider" aria-hidden="true"></div>

          <div class="toolbar-group document-style-group">
            <select id="document-style-preset" class="document-style-select" aria-label="Document style">
              <option value="default" selected>Default</option>
              <option value="acs-document-1996">ACS Document 1996</option>
            </select>
          </div>
        </div>
        <div id="secondary-toolbar" class="toolbar-row toolbar-row-secondary" aria-label="Secondary toolbar"></div>
      </header>

      <aside class="tool-rail" aria-label="Drawing tools">
        <button class="tool-button" type="button" data-tool="select" aria-label="Select" title="Select">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4.5 18.5 12 12 14l-2.5 6z"/></svg>
        </button>
        <button class="tool-button is-active" type="button" data-tool="bond" aria-label="Bond" title="Bond">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 17 19 7"/></svg>
        </button>
        <button class="tool-button" type="button" data-tool="text" aria-label="Text" title="Text">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7.5 19 12 5l4.5 14"/><path d="M9 14h6"/></svg>
        </button>
        <button class="tool-button" type="button" data-tool="arrow" aria-label="Arrow" title="Arrow">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4.5 12h12"/><path class="filled" d="M15.5 7.5 21 12l-5.5 4.5z"/></svg>
        </button>
        <button class="tool-button" type="button" data-tool="bracket" aria-label="Bracket" title="Bracket">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 5H6v14h3"/><path d="M15 5h3v14h-3"/></svg>
        </button>
        <button class="tool-button" type="button" data-tool="symbol" aria-label="Charge and electron symbols" title="Charge and electron symbols">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="6.5"/><path d="M12 8.5v7"/><path d="M8.5 12h7"/></svg>
        </button>
        <button class="tool-button" type="button" data-tool="shape" aria-label="Shape" title="Shape">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="5" width="10" height="10"/><circle cx="16.5" cy="16.5" r="3.5"/></svg>
        </button>
        <button class="tool-button" type="button" data-tool="templates" aria-label="Rings and templates" title="Rings and templates">
          <svg viewBox="0 0 24 24" aria-hidden="true"><polygon points="12,4 19,8 19,16 12,20 5,16 5,8"/></svg>
        </button>
      </aside>

      <main class="canvas-panel">
        <div id="viewer-container" class="viewer-container">
          <svg id="viewer-svg" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
      </main>

      <select id="sample-select" class="visually-hidden" aria-label="Sample document"></select>
      <button id="reload-button" class="visually-hidden" type="button" aria-label="Reload"></button>
      <span id="viewer-title" class="visually-hidden">No document loaded</span>
      <span id="viewer-stats" class="visually-hidden"></span>
      <pre id="doc-meta" class="visually-hidden"></pre>
    </div>

    <script type="module" src="./app.js?v=20260505-savefix"></script>
  </body>
</html>
